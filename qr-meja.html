<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Meja - Kopi Brader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .controls {
            background: white; border-radius: 12px;
            padding: 20px; margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .controls h1 { font-size: 1.2rem; flex: 1; }
        .base-url-input {
            border: 1px solid #ddd; border-radius: 8px;
            padding: 8px 12px; font-size: 0.85rem; width: 280px;
        }
        .print-btn {
            background: #d4ff00; color: #000; font-weight: 700;
            border: none; padding: 10px 20px; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem;
        }
        .print-btn:hover { background: #bfe600; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .qr-card {
            background: white; border-radius: 16px;
            padding: 24px; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            page-break-inside: avoid;
        }
        .card-header {
            background: #0a0a0f; color: white;
            border-radius: 10px; padding: 12px;
            margin-bottom: 16px;
        }
        .brand { font-size: 1rem; font-weight: 800; letter-spacing: 1px; }
        .brand span { color: #d4ff00; }
        .table-num {
            font-size: 2rem; font-weight: 900;
            color: #d4ff00; font-family: monospace;
        }
        .qr-wrap {
            display: flex; justify-content: center;
            margin: 16px 0; padding: 12px;
            background: #f9f9f9; border-radius: 10px;
        }
        .scan-text {
            font-size: 0.78rem; color: #666;
            margin-bottom: 8px;
        }
        .url-text {
            font-size: 0.65rem; color: #999;
            word-break: break-all;
        }
        .bottom-bar {
            margin-top: 14px; padding-top: 12px;
            border-top: 1px dashed #eee;
            font-size: 0.7rem; color: #aaa;
        }

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .qr-card { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="controls">
    <h1>☕ QR Code Meja — Kopi Brader</h1>
    <input class="base-url-input" type="text" id="baseUrl"
        value="https://hummingly-nonsensical-rivka.ngrok-free.dev/s/"
        placeholder="Base URL (contoh: https://hummingly-nonsensical-rivka.ngrok-free.dev/s//)">
    <button class="print-btn" onclick="window.print()">🖨️ Print Semua</button>
</div>

<div class="grid" id="qrGrid"></div>

<script>
    const tables = ['01','02','03','04','05','06','07','08'];

    function generate() {
        const baseUrl = document.getElementById('baseUrl').value.trim();
        const grid = document.getElementById('qrGrid');
        grid.innerHTML = '';

        tables.forEach(num => {
            const url = baseUrl + num;

            const card = document.createElement('div');
            card.className = 'qr-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="brand">☕ KOPI <span>BRADER</span></div>
                    <div class="table-num">MEJA ${num}</div>
                </div>
                <p class="scan-text">Scan QR untuk melihat menu & memesan</p>
                <div class="qr-wrap" id="qr-${num}"></div>
                <p class="url-text">${url}</p>
                <div class="bottom-bar">Scan · Order · Enjoy ☕</div>
            `;
            grid.appendChild(card);

            new QRCode(document.getElementById('qr-' + num), {
                text: url,
                width: 160,
                height: 160,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        });
    }

    generate();
    document.getElementById('baseUrl').addEventListener('change', generate);
</script>

</body>
</html>
